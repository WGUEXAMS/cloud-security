<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Managing Cloud Security Quiz</title>
<style>
  :root{--bg:#f5f5f3;--card:#fff;--border:#d3d1c7;--border2:#b4b2a9;--text:#1a1a18;--text2:#888780;--hover:#f1efe8;--prog-bg:#e8e6df;--correct-bg:#EAF3DE;--correct-border:#639922;--correct-text:#27500A;--wrong-bg:#FCEBEB;--wrong-border:#A32D2D;--wrong-text:#501313;--reveal-bg:#E6F1FB;--reveal-border:#378ADD;--reveal-text:#0C447C;--selected-bg:#EEEAF8;--selected-border:#534AB7;--selected-text:#1a1a18;--accent:#534AB7;--flag:#D97706;--flag-bg:#FEF3C7;--flag-border:#F59E0B;--flag-text:#92400E;--badge-test-bg:#EAF3DE;--badge-test-text:#27500A;--badge-prac-bg:#E6F1FB;--badge-prac-text:#0C447C;}
  [data-theme="dark"]{--bg:#000;--card:#111;--border:#333;--border2:#444;--text:#fff;--text2:#aaa;--hover:#1a1a1a;--prog-bg:#222;--correct-bg:#0a2010;--correct-border:#3a7010;--correct-text:#7fcc40;--wrong-bg:#200a0a;--wrong-border:#8a1a1a;--wrong-text:#ff7070;--reveal-bg:#0a1a30;--reveal-border:#1a50a0;--reveal-text:#60a8ff;--selected-bg:#1a1030;--selected-border:#6060cc;--selected-text:#fff;--accent:#7b72d8;--flag:#B45309;--flag-bg:#1a1000;--flag-border:#D97706;--flag-text:#FCD34D;--badge-test-bg:#0a2010;--badge-test-text:#7fcc40;--badge-prac-bg:#0a1a30;--badge-prac-text:#60a8ff;}
  [data-theme="dark"] .header h1{color:#ffffff;}
  [data-theme="dark"] .q-text{color:#ffffff;}
  [data-theme="dark"] .q-counter{color:#aaaaaa;}
  [data-theme="dark"] body{color:#ffffff;}
  [data-theme="dark"] .card{color:#ffffff;}

  [data-theme="dark"] .mode-card .title{color:#ffffff;}
  [data-theme="dark"] .mode-card .desc{color:#d0d0d0;}
  [data-theme="dark"] .mode-card{background:#111;border-color:#444;}

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0;margin:0;transition:background .2s,color .2s;}
  .card{background:var(--card);padding:2rem;max-width:100%;width:100%;min-height:100vh;transition:background .2s;}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;}
  .header h1{font-size:18px;font-weight:500;}
  .dark-toggle{background:transparent;border:.5px solid var(--border2);border-radius:99px;padding:6px 14px;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit;transition:background .15s;}
  .dark-toggle:hover{background:var(--hover);color:var(--text);}
  .mode-screen{text-align:center;padding:1rem 0 1.5rem;}
  .mode-screen>p{font-size:14px;color:var(--text2);margin-bottom:2rem;}
  .mode-cards{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .mode-card{border:.5px solid var(--border);border-radius:12px;padding:1.5rem 1.25rem;width:200px;cursor:pointer;text-align:left;background:var(--card);transition:background .15s,border-color .15s;}
  .mode-card:hover{background:var(--hover);border-color:var(--border2);}
  .mode-card .icon{font-size:22px;margin-bottom:.65rem;}
  .mode-card .title{font-size:15px;font-weight:500;margin-bottom:.35rem;}
  .mode-card .desc{font-size:13px;color:var(--text2);line-height:1.5;}
  .mode-badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 10px;border-radius:99px;margin-bottom:.7rem;}
  .badge-test{background:var(--badge-test-bg);color:var(--badge-test-text);}
  .badge-practice{background:var(--badge-prac-bg);color:var(--badge-prac-text);}
  .progress-bar-bg{background:var(--prog-bg);border-radius:99px;height:6px;margin-bottom:1.25rem;overflow:hidden;}
  .progress-bar-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .4s ease;}
  .q-counter{font-size:13px;color:var(--text2);margin-bottom:.35rem;}
  .q-text{font-size:16px;font-weight:500;margin-bottom:1rem;line-height:1.5;}
  .options{display:flex;flex-direction:column;gap:9px;}
  .opt-btn{background:var(--card);border:.5px solid var(--border2);border-radius:8px;padding:11px 15px;text-align:left;font-size:14px;color:var(--text);cursor:pointer;transition:background .15s,border-color .15s;line-height:1.45;font-family:inherit;}
  .opt-btn:hover{background:var(--hover);}
  .opt-btn.selected{background:var(--selected-bg);border-color:var(--selected-border);color:var(--selected-text);font-weight:500;}
  .opt-btn.correct{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct-text);}
  .opt-btn.wrong{background:var(--wrong-bg);border-color:var(--wrong-border);color:var(--wrong-text);}
  .opt-btn.revealed{background:var(--reveal-bg);border-color:var(--reveal-border);color:var(--reveal-text);}
  .opt-btn.picked{background:var(--selected-bg);border-color:var(--selected-border);color:var(--selected-text);font-weight:500;}
  .opt-btn:disabled{cursor:default;}
  .hint{font-size:12px;color:var(--text2);margin-top:.4rem;}
  .feedback-wrap{margin-top:1rem;min-height:20px;}
  .feedback{font-size:14px;font-weight:500;}
  .feedback.correct{color:var(--correct-border);}
  .feedback.wrong{color:var(--wrong-border);}
  .feedback.info{color:var(--reveal-border);}
  .rationale{font-size:13px;color:var(--text2);margin-top:.75rem;line-height:1.55;padding:10px 12px;background:var(--hover);border-radius:7px;border-left:3px solid var(--accent);}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.1rem;gap:8px;flex-wrap:wrap;}
  .nav-left,.nav-right{display:flex;gap:7px;flex-wrap:wrap;}
  .action-btn{background:transparent;border:.5px solid var(--border2);border-radius:8px;padding:8px 13px;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit;transition:background .15s;}
  .action-btn:hover:not(:disabled){background:var(--hover);color:var(--text);}
  .action-btn:disabled{opacity:.3;cursor:default;}
  .action-btn.active-toggle{background:var(--reveal-bg);border-color:var(--reveal-border);color:var(--reveal-text);}
  .flag-btn{background:transparent;border:.5px solid var(--border2);border-radius:8px;padding:8px 13px;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit;transition:background .15s,border-color .15s;}
  .flag-btn:hover{background:var(--flag-bg);border-color:var(--flag-border);color:var(--flag-text);}
  .flag-btn.flagged{background:var(--flag-bg);border-color:var(--flag-border);color:var(--flag-text);font-weight:500;}
  .next-btn{background:transparent;border:.5px solid var(--border2);border-radius:8px;padding:8px 18px;font-size:14px;cursor:pointer;color:var(--text);font-family:inherit;transition:background .15s;}
  .next-btn:hover{background:var(--hover);}
  .submit-btn{background:var(--accent);border:.5px solid var(--accent);border-radius:8px;padding:8px 18px;font-size:14px;cursor:pointer;color:#fff;font-family:inherit;}
  .submit-btn:hover{opacity:.9;}
  .num-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:1.1rem;padding-top:1rem;border-top:.5px solid var(--border);}
  .num-btn{width:30px;height:28px;border-radius:6px;border:.5px solid var(--border2);background:var(--card);color:var(--text2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;position:relative;transition:background .12s;}
  .num-btn:hover{background:var(--hover);color:var(--text);}
  .num-btn.active{border-color:var(--accent);color:var(--accent);font-weight:700;}
  .num-btn.num-selected{background:var(--selected-bg);border-color:var(--selected-border);color:var(--selected-text);}
  .num-btn.done-correct{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct-text);}
  .num-btn.done-wrong{background:var(--wrong-bg);border-color:var(--wrong-border);color:var(--wrong-text);}
  .num-btn.done-revealed{background:var(--reveal-bg);border-color:var(--reveal-border);color:var(--reveal-text);}
  .num-btn.done-picked{background:var(--selected-bg);border-color:var(--selected-border);color:var(--selected-text);}
  .num-btn.flagged{background:var(--flag-bg);border-color:var(--flag-border);color:var(--flag-text);}
  .num-btn.flagged::after{content:'';position:absolute;top:-3px;right:-3px;width:7px;height:7px;border-radius:99px;background:var(--flag);}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:.5rem;font-size:11px;color:var(--text2);}
  .legend-item{display:flex;align-items:center;gap:4px;}
  .legend-dot{width:10px;height:10px;border-radius:3px;border:.5px solid;}
  .score-card{text-align:center;padding:1.5rem .5rem;}
  .score-num{font-size:52px;font-weight:500;color:var(--accent);}
  .score-label{font-size:15px;color:var(--text2);margin-bottom:1.25rem;}
  .score-msg{font-size:15px;margin-bottom:1.25rem;}
  .summary-row{display:flex;gap:12px;justify-content:center;margin-bottom:1.25rem;flex-wrap:wrap;}
  .summary-pill{font-size:13px;padding:6px 14px;border-radius:99px;font-weight:500;}
  .pill-correct{background:var(--correct-bg);color:var(--correct-text);}
  .pill-wrong{background:var(--wrong-bg);color:var(--wrong-text);}
  .pill-flag{background:var(--flag-bg);color:var(--flag-text);border:.5px solid var(--flag-border);}
  .end-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:1.25rem;}
  .restart-btn{background:transparent;border:.5px solid var(--border2);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;color:var(--text);font-family:inherit;transition:background .15s;}
  .restart-btn:hover{background:var(--hover);}
  .missed-list{text-align:left;margin-top:1rem;}
  .missed-item{background:var(--hover);border-radius:8px;padding:11px 13px;margin-bottom:9px;font-size:13px;border-left:3px solid var(--wrong-border);}
  .missed-q{font-weight:500;margin-bottom:4px;}
  .missed-a{color:var(--correct-border);}
  .practice-end{text-align:center;padding:1.5rem 0;}
  .practice-end .big{font-size:36px;margin-bottom:.5rem;}
  .practice-end h2{font-size:18px;font-weight:500;margin-bottom:.5rem;}
  .practice-end p{font-size:14px;color:var(--text2);margin-bottom:1.5rem;}
</style>
</head>
<body>
<div class="card" id="app" data-theme="light">
  <div class="header">
    <h1>Managing Cloud Security Quiz</h1>
    <button class="dark-toggle" id="theme-btn" onclick="toggleDark()">&#127769; Dark</button>
  </div>
  <div id="root"></div>
</div>
<script>
function toggleDark(){const a=document.getElementById('app');const d=a.getAttribute('data-theme')==='dark';a.setAttribute('data-theme',d?'light':'dark');document.getElementById('theme-btn').textContent=d?'\u{1F319} Dark':'\u2600\uFE0F Light';}

const questions=[
  {q:"Which phase of the cloud data life cycle involves activities such as data categorization and classification, including data labeling, marking, tagging, and assigning metadata?",opts:["Store","Use","Destroy","Create"],ans:3,rat:"The Create phase is where data is generated or captured. Activities like labeling, marking, tagging, and assigning metadata establish the foundation for enforcing controls throughout the rest of the life cycle."},
  {q:"Which phase of the cloud data life cycle involves the process of crypto-shredding?",opts:["Destroy","Create","Archive","Store"],ans:0,rat:"The Destroy phase is where information is permanently removed. Crypto-shredding involves deleting or revoking encryption keys. Once those keys are destroyed, the encrypted data becomes mathematically unrecoverable."},
  {q:"In most RAID configurations, data is stored across different disks. Which method of storing data is described?",opts:["Striping","Archiving","Mapping","Crypto-shredding"],ans:0,rat:"Striping splits data into smaller segments written across multiple disks simultaneously, enhancing I/O performance. When combined with mirroring or parity, it provides both speed and fault tolerance."},
  {q:"Which threat prohibits the use of data by preventing access to it?",opts:["Brute force","Encryption","Rainbow tables","Denial of service"],ans:3,rat:"A DoS attack aims to make a system or data unavailable to legitimate users by overwhelming resources, disrupting availability — the 'A' in the CIA triad."},
  {q:"Which location is a secure option for storing encryption keys for decrypting archival data?",opts:["A repository that is made private","An escrow that is kept separate from the data it is tied to","An escrow that is kept local to the data it is tied to","A repository that is made public"],ans:1,rat:"Industry best practice requires encryption keys to be stored separately from the data they protect. An escrow provides controlled storage, ensuring keys are only accessible by authorized processes."},
  {q:"An organization wants all entities to trust certificates generated internally. What should be used to generate these certificates?",opts:["Individual users' private keys","The organization's certificate repository server","The organization's certificate authority server","Individual systems' private keys"],ans:2,rat:"A Certificate Authority (CA) is a trusted entity that validates identities and signs certificates. Using an organizational CA server links all certificates to a root of trust."},
  {q:"A customer service representative needs to verify a customer's private information but does not need to see all of it. Which technique should the service provider use?",opts:["Hashing","Encryption","Masking","Tokenization"],ans:2,rat:"Data masking replaces sensitive fields with obfuscated or partial values while retaining usability, enforcing least privilege and reducing exposure of sensitive information."},
  {q:"An organization planning for a PCI DSS audit wants to ensure only relevant files are included. Which process identifies the relevant files?",opts:["Normalization","Tokenization","Categorization","Anonymization"],ans:2,rat:"Categorization systematically identifies and classifies files according to content and relevance, identifying which files fall within PCI DSS scope."},
  {q:"As part of an e-discovery process, an employee needs to identify all documents containing a specific phrase. Which discovery method should be used?",opts:["Location-based","Content-based","Label-based","Metadata-based"],ans:1,rat:"Content-based discovery searches within the actual text or binary content of documents to find keyword or phrase matches."},
  {q:"An organization wants to track how often a file is accessed and by which users. Which IRM solution should it implement?",opts:["Automatic expiration","Dynamic policy control","Persistent protection","Continuous auditing"],ans:3,rat:"Continuous auditing in IRM monitors access events in real time, recording who accessed a file, when, and how often."},
  {q:"After creating a backup set, which action should an engineer take periodically to ensure the backed-up data is viable?",opts:["Test the backups according to company policy","Delete backups according to company policy","Compare the old backups with newer ones","Replace the old backups with newer ones"],ans:0,rat:"Testing backups on a periodic basis is the only reliable way to validate viability. Corruption or misconfiguration can go unnoticed until a disaster occurs."},
  {q:"An organization reviewing a cloud provider contract wants to verify the provider is meeting its obligations. Which control allows this?",opts:["Continuous monitoring","Confidential computing","Regulatory oversight","Incident management"],ans:0,rat:"Continuous monitoring involves automated collection and analysis of operational, security, and performance data, ensuring SLAs are honored and compliance requirements are met in real time."},
  {q:"A security analyst must compile a report of all people who used a system between two dates, including how long and how often. Which information should the report include?",opts:["Informational logs and message of the day","Environmental errors and 802.1x logs","User identifications and access timestamps","User commands and error timestamps"],ans:2,rat:"User identifications and access timestamps record who accessed the system, at what time, and for how long."},
  {q:"Which role in cloud computing provides products or services that interact with the primary offering of a cloud service provider?",opts:["Regulator","Cloud service partner","Customer","Cloud service developer"],ans:1,rat:"A cloud service partner plays a complementary role by offering products or services that enhance or interact with the primary cloud provider's offerings."},
  {q:"Which type of storage includes categories such as relational, nonrelational, key-value, and document-oriented?",opts:["XML","Database","Object-based","Volume"],ans:1,rat:"Relational, nonrelational, key-value, and document-oriented all refer to different types of databases."},
  {q:"Which characteristic of cloud computing refers to sharing physical assets among multiple customers?",opts:["Rapid scalability","On-demand self-service","Resource pooling","Measured service"],ans:2,rat:"Resource pooling (defined by NIST) refers to the provider's ability to serve multiple customers by dynamically allocating computing resources using virtualization."},
  {q:"Which category of cloud service provides on-demand access to virtualized servers, block storage, and networking capacity to create custom IT solutions?",opts:["Networking as a service (NaaS)","Platform as a service (PaaS)","Software as a service (SaaS)","Infrastructure as a service (IaaS)"],ans:3,rat:"IaaS delivers fundamental computing resources including virtual machines, block storage, networking, and load balancers, giving maximum flexibility and control."},
  {q:"Which cloud computing service model allows customers to run their own application code without configuring the server environment?",opts:["Data science as a service (DSaaS)","Infrastructure as a service (IaaS)","Software as a service (SaaS)","Platform as a service (PaaS)"],ans:3,rat:"PaaS allows customers to focus on writing and deploying code without managing underlying infrastructure. The provider manages the OS, runtime, and middleware."},
  {q:"Which data destruction technique involves encrypting the data, encrypting the resulting keys with a different engine, and then destroying the keys from the second encryption round?",opts:["One-way hashing","Degaussing","Overwriting","Cryptographic erasure"],ans:3,rat:"Cryptographic erasure involves encrypting data, encrypting those keys with a second layer, then destroying the second-layer keys. Without the keys, the encrypted data becomes unreadable."},
  {q:"Which term refers to taking an accurate account of a system's desired standard state so changes can be quickly detected?",opts:["Baselining","Patch management","Deployment","Capacity management"],ans:0,rat:"Baselining establishes a reference point for the standard configuration of systems, enabling detection of deviations, unauthorized changes, or misconfigurations."},
  {q:"Which type of data sanitization should be used to destroy data on a USB thumb drive while keeping the drive intact?",opts:["Key revocation","Physical destruction","Overwriting","Degaussing"],ans:2,rat:"Overwriting replaces existing data on the device with random data while leaving the physical device intact for reuse. Degaussing only works on magnetic media."},
  {q:"Which security concept requires continuous identity and authorization checks to allow access to data?",opts:["Traffic inspection","Zero trust","Intrusion prevention","Secret management"],ans:1,rat:"The Zero Trust security model assumes no user, device, or application should be trusted by default. Every access request must be continuously verified."},
  {q:"A user creates new financial documents to be stored in the cloud. Which action protects them against packet capture and on-path attacks?",opts:["Hashing","Encryption","Change tracking","Metadata labeling"],ans:1,rat:"Encryption converts plaintext into ciphertext only decipherable with the correct keys, ensuring that even if traffic is intercepted, the attacker cannot read the data."},
  {q:"An organization creates a plan for long-term cloud storage of its backup data. What should it address to avoid losing access?",opts:["Quantum computing","Change tracking","Key management","Regulatory compliance"],ans:2,rat:"If encryption keys are lost, corrupted, or improperly rotated, the organization will lose the ability to decrypt its own data, rendering backups unusable."},
  {q:"Which design pillar encompasses the ability to support development, run workloads effectively, gain insights into operations, and continuously improve processes?",opts:["Performance efficiency","Operational excellence","Reliability","Sustainability"],ans:1,rat:"The Operational Excellence pillar emphasizes developing, deploying, and operating workloads effectively, including monitoring operations and continuously improving processes."},
  {q:"Which concept focuses on operating highly available workloads in the cloud?",opts:["Resource hierarchy","Security","Operational excellence","Reliability"],ans:3,rat:"Reliability ensures workloads can recover quickly from disruptions. It focuses on high availability, fault tolerance, and disaster recovery through redundancy and robust monitoring."},
  {q:"A cloud provider processing credit card payments cannot encrypt cardholder data due to a legacy system. What should it implement to maintain PCI DSS compliance?",opts:["Privacy control","Protection levels","Risk acceptance","Compensating control"],ans:3,rat:"When a required PCI DSS control cannot be implemented due to technical limitations, a compensating control — an alternative safeguard that meets the intent of the original requirement — must be applied."},
  {q:"A customer requests that a cloud provider physically destroys any drives storing their personal data. What must the provider do?",opts:["Destroy them only if the contract includes hardware disposal insurance","Use cryptographic erasure to securely remove any personal data","Destroy them only if dedicated hardware disposal is specified in the contract","Use degaussing tools to securely remove any personal data"],ans:2,rat:"Drives are not destroyed for each customer unless explicitly required in the contract. If the agreement specifies dedicated hardware disposal, the provider must comply."},
  {q:"When should a cloud service provider delete customer data?",opts:["When the cloud provider oversubscribes its storage space","When the data has not been accessed in the last 30 days","After a scheduled data review","After the specified retention period"],ans:3,rat:"The correct time for data deletion is after the specified retention period defined by contractual agreements, regulatory frameworks, or internal policies."},
  {q:"Which device is used to create and manage encryption keys used for data transmission in a cloud-based environment?",opts:["Hardware security module (HSM)","Memory controller","RAID controller","Trusted platform module (TPM)"],ans:0,rat:"A Hardware Security Module (HSM) is a dedicated, tamper-resistant device for creating, managing, and storing encryption keys, essential for cryptographic operations like SSL/TLS key management."},
  {q:"Which action should be taken to ensure that unencrypted network traffic is protected?",opts:["Transmit using SSL protocol","Transmit after compression and password protection using GZ","Transmit using generic routing encapsulation (GRE)","Transmit using TLS protocol"],ans:3,rat:"Transport Layer Security (TLS) provides confidentiality, integrity, and authentication by encrypting data in transit. Unlike the deprecated SSL, TLS is the industry standard."},
  {q:"Which setting ensures that an attacker cannot read information stored temporarily for use by another virtual machine?",opts:["Encrypted network protocols","Encrypted file system","Dedicated processor","Dedicated memory"],ans:3,rat:"Dedicated memory allocation ensures isolation between VMs. Without memory isolation, remnants of one VM's operations might remain in physical memory and be accessible to another VM."},
  {q:"An organization needs space where security administrators can centrally monitor network traffic and events and respond to threats. What should it create?",opts:["Emergency response team (ERT)","Security operations center (SOC)","Disaster response team (DRT)","Network operations center (NOC)"],ans:1,rat:"A SOC is a centralized facility allowing administrators to monitor, detect, investigate, and respond to cybersecurity events in real time."},
  {q:"An organization experienced an unplanned event causing customers to face a loss of service. What does the incident seek to resolve?",opts:["Change","Error","Disruption","Bug"],ans:2,rat:"In ITIL frameworks, disruptions occur when an incident prevents normal service delivery. The goal of incident management is to restore service quickly and minimize impact."},
  {q:"An engineer needs to create segmentation using cloud provider tools to limit traffic between two cloud deployments. Which mechanisms should the engineer use?",opts:["MAC addresses and protocols","Ports and protocols","Unique identifiers and protocols","Definitions and protocols"],ans:1,rat:"Cloud security groups filter traffic based on ports and protocols, controlling communication between deployments. MAC addresses apply to physical networks, not cloud-level segmentation."},
  {q:"A group of DevOps engineers find a bug during a code release causing production issues. Which safeguard restores functionality?",opts:["Staging","Code review","Code testing","Rollback"],ans:3,rat:"A rollback restores a system to its previous stable state when a new code release introduces issues. Once a bug has been deployed, rollback is the corrective control that minimizes downtime."},
  {q:"Which tool should a developer use to describe requirements gathered for a code improvement as part of a current release?",opts:["Cases","Stories","Cookies","Notes"],ans:1,rat:"In Agile development, user stories are the standard way to capture requirements, describing functionality from the end user's perspective."},
  {q:"Which release management term describes the process from code implementation to code review to automated testing to production deployment?",opts:["Iteration","Baseline","Pipeline","Framework"],ans:2,rat:"A CI/CD pipeline refers to the structured process of moving code from development to production, encompassing implementation, review, automated testing, and deployment."},
  {q:"Which activity is within the scope of the cloud provider's role in the chain of custody?",opts:["Setting data backup and recovery policies","Collecting and preserving digital evidence","Initiating and executing incident response","Classifying and analyzing data"],ans:1,rat:"The provider's role in the chain of custody primarily involves collecting and preserving digital evidence when incidents or investigations occur."},
  {q:"During a financial data investigation, the investigator is unsure how to handle a specific data set. Which documentation should they refer to for detailed steps?",opts:["Policies","Procedures","Legal rulings","Legal definitions"],ans:1,rat:"Procedures are detailed, step-by-step instructions guiding personnel on how to perform specific tasks, providing the operational guidance required during investigations."},
  {q:"Which group should be notified for approval when a planned modification to an environment is scheduled?",opts:["Event management team","Problem management team","Change management board","Executive management board"],ans:2,rat:"The Change Management Board (CMB) / Change Advisory Board (CAB) is the formal authority for reviewing, assessing, and approving planned modifications to IT environments."},
  {q:"An organization has selected a new ERM vendor and is preparing for onboarding. Which issues should be discussed during this phase?",opts:["Verifying the details of the contract and arrangements for data transfer","Ensuring the vendor has securely destroyed all confidential information","Identifying the business need the vendor will address","Deciding how to respond to the RFP"],ans:0,rat:"The onboarding phase requires contractual verification and technical arrangements for data transfer, including service levels, compliance requirements, and encryption standards."},
  {q:"An organization sharing personal information with a trusted third party — what else should it communicate?",opts:["The results of the most recent privacy audit","A notice of any contractual obligations that do not align with the privacy policy","A copy of federal privacy laws regarding unauthorized data disclosure","The organization's privacy policy and handling practices"],ans:3,rat:"When sharing personal data with a trusted third party, organizations must ensure the recipient understands and adheres to the organization's privacy policy and handling practices."},
  {q:"Engineers are against using vendor-specific APIs for a new service. Which cloud concern are they worried about?",opts:["Reliability","Scalability","Portability","Availability"],ans:2,rat:"The engineers are concerned about portability. Vendor-specific APIs create dependency on a single provider, leading to vendor lock-in."},
  {q:"Which common API threat occurs when attackers send malicious code through a form input to a web application so it may then be executed?",opts:["On-path","Injection","Credential","Denial-of-service"],ans:1,rat:"Injection occurs when unvalidated input is sent to an application through API forms or parameters. If the application fails to sanitize input, the attacker's code may be executed with full system privileges."},
  {q:"Which methodology encompasses conducting tests around the interaction of end users with new code intended for a patch?",opts:["Full testing","Nonfunctional testing","Tabletop testing","Functional testing"],ans:3,rat:"Functional testing validates that new or updated code performs correctly from the end user's perspective, focusing on verifying user interactions, workflows, and outputs."},
  {q:"A new customer information system has an updated graphical interface with new fields. Which functional testing type ensures it behaves as employees need?",opts:["Load testing","Regression testing","Security testing","Acceptance testing"],ans:3,rat:"Acceptance testing evaluates whether the system meets user requirements in real-world conditions — the final validation step before production deployment."},
  {q:"Which steps should an organization take to avoid risk when dealing with software licensing?",opts:["Ensure it has the correct type of license","Ensure it has the correct location to store licenses","Ensure it only uses closed-source licenses","Ensure it only uses open-source licenses"],ans:0,rat:"Software licenses define usage rights, limitations, and legal obligations. Using software outside license terms can lead to legal penalties and financial fines."},
  {q:"After selecting a new vendor, what should an organization do next as part of vendor onboarding?",opts:["Terminate the relationship and dissolve technical agreements","Monitor vendor practices by performing audits","Evaluate whether the vendor meets the organization's security policies","Confirm contractual details and arrange technical agreements, data transfers, and encryption standards"],ans:3,rat:"The onboarding phase requires confirming contractual details and arranging technical agreements — specifying encryption standards, data transfer methods, SLAs, and compliance responsibilities."},
  {q:"Which iterative software development methodology focuses on customer satisfaction by delivering software early and welcoming changing requirements?",opts:["Agile","Spiral","Waterfall","Lean"],ans:0,rat:"Agile is an iterative methodology prioritizing customer satisfaction, adaptability, and incremental delivery. Frameworks like Scrum and Kanban embody this philosophy."},
  {q:"Which phase of software design covers the combination of individual components of developed code and the determination of proper interoperability?",opts:["Testing","Training","Planning","Coding"],ans:0,rat:"The Testing phase — specifically integration testing — integrates individual code components and verifies their interoperability."},
  {q:"An accountant allowed only to adjust hours worked instead modifies an employee's personal information. Which part of the STRIDE model describes this?",opts:["Spoofing","Denial of service","Tampering","Elevation of privilege"],ans:2,rat:"Tampering refers to unauthorized alteration of data or systems. The accountant had legitimate access but misused it to alter data outside their scope of responsibility."},
  {q:"Which threat modeling process would a security analyst use to test a new application from a malicious actor's perspective?",opts:["DREAD","ATASM","PASTA","STRIDE"],ans:2,rat:"PASTA (Process for Attack Simulation and Threat Analysis) is a risk-centric threat modeling methodology explicitly focusing on simulating real-world attacks from an adversary's perspective."},
  {q:"Which tool provides a dedicated environment to contain and analyze malware?",opts:["Encryption","Gateway","Sandbox","Controller"],ans:2,rat:"A sandbox is a controlled, isolated environment used to safely run, observe, and analyze potentially malicious code without risking contamination of production systems."},
  {q:"Which action should a customer take to add an extra layer of protection to data stored in a public cloud environment?",opts:["Use additional encryption for sensitive files and folders","Use web application firewalls (WAFs)","Use database activity monitoring (DAM)","Use block storage instead of file storage"],ans:0,rat:"Customers should apply additional encryption for defense-in-depth. Encrypting files and folders before uploading ensures that even if provider-side protections fail, data remains confidential."},
  {q:"An organization needs a system that stores employee credentials and validates all authentication and authorization requests. Which system meets this requirement?",opts:["Hardware security module (HSM)","Zero trust","Bastion host","Identity provider (IdP)"],ans:3,rat:"An Identity Provider (IdP) stores and manages identity information and validates authentication and authorization requests, supporting protocols like SAML, OAuth, and OpenID Connect."},
  {q:"A remote-work organization needs a control for cybersecurity insurance ensuring only authorized personnel can access the network, data, and emails. Which control should it implement?",opts:["Network segmentation","Application whitelisting","Multifactor authentication (MFA)","Trusted platform module (TPM)"],ans:2,rat:"MFA is a commonly mandated control for obtaining cybersecurity insurance. It requires users to present at least two independent factors, significantly reducing the risk of unauthorized access."},
  {q:"Which component allows customers to transfer data into and out of a cloud computing vendor's environment?",opts:["Firewall","Virtual display","Network","Load balancer"],ans:2,rat:"The network provides the connectivity through which data is uploaded, downloaded, and exchanged between customer systems and cloud infrastructure."},
  {q:"Which platform component includes containers and storage?",opts:["Security","Monitoring","Networking","Compute"],ans:3,rat:"The compute component encompasses resources used to run workloads, including containers, virtual machines, and storage tied directly to those workloads."},
  {q:"An organization is informed that a storage device containing some of its data has been seized as evidence in a case it is not involved in. Which cloud characteristic makes this possible?",opts:["Virtualization","Multitenancy","Software as a service (SaaS)","Platform as a service (PaaS)"],ans:1,rat:"Multitenancy means multiple customers share the same physical infrastructure. If a storage device is seized in a case involving another customer, unrelated organizations may still be affected."},
  {q:"Which risk associated with SaaS can an organization avoid by choosing PaaS instead?",opts:["Vendor lock-out","Vendor lock-in","Personnel threat","Natural disaster"],ans:1,rat:"With SaaS, customers have little control over data portability, creating a higher risk of vendor lock-in. PaaS gives customers more flexibility to build and manage their own applications."},
  {q:"An organization's help desk was fraudulently called and convinced to disclose sensitive employee data. Which type of threat does this represent?",opts:["Man-in-the-middle attacks","Social engineering","Escalation of privilege","Internal threats"],ans:1,rat:"Social engineering manipulates individuals into divulging confidential information. Common tactics include phishing, pretexting, and phone-based fraud (vishing)."},
  {q:"An organization is considering a cloud provider with multivendor pathway connectivity. What does this feature provide?",opts:["Connections to several electric providers not on the same grid","Contracts with fuel providers","Contracts with HVAC providers","Connections to several internet service providers"],ans:3,rat:"Multivendor pathway connectivity refers to a cloud provider's ability to maintain connections with multiple ISPs, ensuring redundancy and reducing the risk of outages due to a single ISP failure."},
  {q:"An organization designing a data center wants the ability to quickly create and shut down virtual systems based on demand. Which concept describes this?",opts:["Resource scheduling","High availability","Ephemeral computing","Maintenance mode"],ans:2,rat:"Ephemeral computing refers to rapidly creating and destroying virtual systems as demand fluctuates. These short-lived resources are provisioned automatically when needed and decommissioned when demand subsides."},
  {q:"An organization wants to secure the boundary between a lower-security zone and a higher-security zone. Which security measure should it use?",opts:["Virtual client","Secure Shell","Bastion host","Host isolation"],ans:2,rat:"A bastion host is a hardened system placed at the boundary between security zones, controlling access from a less secure network into a higher-security zone."},
  {q:"A governmental data storage organization plans to relocate its primary data center. Which defense prevents vehicles from causing harm?",opts:["Locks","Cameras","Bollards","Fences"],ans:2,rat:"Bollards are physical barriers designed to prevent vehicles from ramming into secure facilities. Only bollards physically block vehicle-borne attacks."},
  {q:"An organization implementing a hybrid cloud deployment wants employees to provide a username, password, and security token. Which security control is this?",opts:["Authorization","Web application firewall (WAF)","Access control list (ACL)","Authentication"],ans:3,rat:"Requiring a username, password, and security token describes authentication — verifying user identity using multiple factors (MFA)."},
  {q:"Before granting access, the security team wants all employees checked against a database to verify they are allowed to access the requested resource. Which security control is this?",opts:["Authorization","Web application firewall (WAF)","Antispyware program","Authentication"],ans:0,rat:"Authorization determines what resources a user can access based on their role, attributes, or policies stored in an access control database, enforcing least privilege."},
  {q:"An organization creating a disaster recovery plan realizes it lacks a complete understanding of its infrastructure. Which action should it take?",opts:["Create a checklist of the necessary tasks","Determine the criteria of a disaster","Identify the key roles in a disaster","Perform an inventory of assets"],ans:3,rat:"Without a clear understanding of infrastructure and software, the team must first conduct an inventory of assets. All other DRP activities rely on knowing what assets exist."},
  {q:"An organization studies the type of natural events that commonly occur and the risk involved for each data center location. What is the leadership team doing?",opts:["Performing an asset inventory","Running a disaster declaration process","Identifying the actions","Defining the disaster criteria"],ans:3,rat:"By analyzing natural events and assessing associated risks, the leadership team is defining the disaster criteria — determining what conditions qualify as disasters requiring activation of the recovery plan."},
  {q:"Which U.S. law requires all publicly traded corporations to provide information about their financial status and implements controls to ensure accuracy?",opts:["The Gramm-Leach-Bliley Act (GLBA)","The General Data Protection Regulation (GDPR)","The Sarbanes-Oxley (SOX) Act","The Clarifying Lawful Overseas Use of Data (CLOUD) Act"],ans:2,rat:"The Sarbanes-Oxley (SOX) Act of 2002 requires publicly traded corporations to maintain accurate financial reporting and implement internal controls to safeguard integrity of disclosed information."},
  {q:"What is the process of identifying and procuring stored data as evidence for legal purposes?",opts:["Chain of custody","Forensic imaging","Electronic discovery","Gap analysis"],ans:2,rat:"Electronic discovery (e-discovery) involves identifying, collecting, and producing electronically stored information (ESI) that may serve as evidence in legal proceedings."},
  {q:"Which term describes data elements that, when combined with other information, are used to single out an individual?",opts:["Direct identifiers","Data subjects","Personal details","Indirect identifiers"],ans:3,rat:"Indirect identifiers may not identify an individual alone but, when combined with other data, can uniquely identify someone — such as birthdate, ZIP code, or gender."},
  {q:"Which privacy issue does the CLOUD Act address?",opts:["Conflicting regulations in different jurisdictions","Collection and use of genetic information","Data breach notification requirements","Use of digital surveillance by multinational employers"],ans:0,rat:"The CLOUD Act addresses conflicts when law enforcement in one jurisdiction seeks access to data stored in another country, clarifying how U.S. authorities can compel cloud providers to produce data stored overseas."},
  {q:"An organization conducts an external audit of IT policies after moving all production systems to the cloud. Which IT policy will have low priority?",opts:["Data classification","Hardware management","Software procurement","Acceptable use"],ans:1,rat:"In a cloud environment, hardware management responsibility shifts primarily to the cloud provider. Customers no longer manage servers, storage devices, or physical networks directly."},
  {q:"Which testing standard is currently used to guide SOC audits outside the United States?",opts:["SSAE 18","ISRE 2400","SSARS 25","ISAE 3402"],ans:3,rat:"Outside the United States, ISAE 3402 is the standard used for audits equivalent to SOC reports, ensuring service organizations demonstrate adequate internal controls."},
  {q:"Which U.S. standard is used by federal government agencies to manage enterprise risk?",opts:["ISO 37500","SSAE 18","COSO framework","NIST SP 800-37"],ans:3,rat:"Federal agencies rely on NIST SP 800-37 (Risk Management Framework) to manage enterprise risk, providing a structured process for categorizing systems, selecting controls, and continuous monitoring."},
  {q:"Which business area in the ERM strategy is concerned with formal risk assessments when forming new or renewing vendor relationships?",opts:["Software development","Procurement","Quality assurance","Marketing"],ans:1,rat:"The procurement function is directly responsible for vendor selection and contract management, including formal risk assessments to ensure third-party providers meet security and compliance requirements."},
  {q:"An organization wants to protect its critical data if the cloud provider goes out of business by storing a copy with a neutral third party. Which provision should be included in the contract?",opts:["Indemnification","Escrow","Offboarding","Encryption"],ans:1,rat:"Data escrow involves storing critical data or software with a neutral third party that can release it to the customer if the provider fails to meet obligations, protecting business continuity."},
  {q:"Which section of a contract includes the customer's right to audit the vendor to verify whether the vendor is fulfilling its contractual obligations?",opts:["Assurance","Indemnification","Termination","Litigation"],ans:0,rat:"The Assurance section specifies the customer's rights to verify that the vendor is meeting contractual and compliance obligations, often including the right to audit or require compliance reports like SOC 2."},
];

const originalQuestions=[...questions];
let activeQuestions=[...questions];
let mode=null,current=0;
let testState=activeQuestions.map(()=>null);
let practiceState=activeQuestions.map(()=>({picked:null,showAnswer:false}));
let flagged=activeQuestions.map(()=>false);
let testGraded=false;

function resetState(){current=0;testState=activeQuestions.map(()=>null);practiceState=activeQuestions.map(()=>({picked:null,showAnswer:false}));flagged=activeQuestions.map(()=>false);testGraded=false;}

function numGrid(){
  const btns=activeQuestions.map((_,i)=>{
    let cls='num-btn';
    const isFlagged=flagged[i];
    if(i===current)cls+=' active';
    else if(isFlagged)cls+=' flagged';
    else if(mode==='test'){
      if(testGraded){cls+=testState[i]===activeQuestions[i].ans?' done-correct':testState[i]!==null?' done-wrong':'';}
      else if(testState[i]!==null)cls+=' num-selected';
    } else {
      const ps=practiceState[i];
      if(ps.showAnswer)cls+=' done-revealed';
      else if(ps.picked!==null)cls+=' done-picked';
    }
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
  const flagCount=flagged.filter(Boolean).length;
  return `<div class="num-grid">${btns}</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--flag-bg);border-color:var(--flag-border);"></div><span>&#127988; Flagged for review${flagCount>0?' ('+flagCount+')':''}</span></div>
      ${mode==='test'&&!testGraded?'<div class="legend-item"><div class="legend-dot" style="background:var(--selected-bg);border-color:var(--selected-border);"></div><span>Answered</span></div>':''}
    </div>`;
}
function jumpTo(i){current=i;render();}




function renderModeSelect(){
  document.getElementById('root').innerHTML=`
    <div class="mode-screen">\n      
      <p>${activeQuestions.length} questions &nbsp;&middot;&nbsp; Choose your mode</p>
      <div class="mode-cards">
        <div class="mode-card" onclick="startMode('test')">
          <div class="icon">&#128221;</div><div class="title">Test</div>
          <div class="desc">Select answers freely, flag questions to revisit, then submit for grading.</div>
        </div>
        <div class="mode-card" onclick="startMode('practice')">
          <div class="icon">&#128218;</div><div class="title">Practice</div>
          <div class="desc">Show/hide answers, flag questions to revisit.No score.</div>
        </div>
      </div>
    </div>`;
}
function startMode(m){mode=m;if(m==="test"){const copy=[...originalQuestions];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]];}activeQuestions=copy;}else{activeQuestions=[...originalQuestions];}resetState();render();}

function render(){
  const root=document.getElementById('root');
  if(mode==='test'&&testGraded&&current>=activeQuestions.length){renderTestResults();return;}
  if(mode==='practice'&&current>=activeQuestions.length){renderPracticeEnd();return;}
  const q=activeQuestions[current];
  const pct=Math.round((current/questions.length)*100);
  const isLast=current===activeQuestions.length-1;
  const isFlagged=flagged[current];
  let optHtml='',fbText='',fbCls='feedback',practiceControls='',rationaleHtml='',navRight='',hint='';

  if(mode==='test'){
    const sel=testState[current];
    optHtml=q.opts.map((o,i)=>{
      let cls='opt-btn';
      if(testGraded){if(i===q.ans)cls+=' correct';else if(i===sel)cls+=' wrong';}
      else if(i===sel)cls+=' selected';
      return `<button class="${cls}" ${testGraded?'disabled':''} onclick="testPick(${i})">${String.fromCharCode(65+i)}) ${o}</button>`;
    }).join('');
    if(testGraded){
      if(sel===q.ans){fbText='&#10003; Correct!';fbCls+=' correct';}
      else if(sel===null){fbText='Not answered';fbCls+=' info';}
      else{fbText='&#10007; Incorrect &mdash; correct: '+String.fromCharCode(65+q.ans)+') '+q.opts[q.ans];fbCls+=' wrong';}
    } else {hint=`<div class="hint">Select an answer &mdash; you can change it before submitting</div>`;}
    if(isLast&&!testGraded){navRight=`<button class="action-btn" ${current===0?'disabled':''} onclick="prev()">&larr; Back</button><button class="submit-btn" onclick="submitTest()">Submit all &rarr;</button>`;}
    else{navRight=`<button class="action-btn" ${current===0?'disabled':''} onclick="prev()">&larr; Back</button><button class="next-btn" onclick="next()">${isLast&&testGraded?'Results &rarr;':'Next &rarr;'}</button>`;}
  } else {
    const ps=practiceState[current];
    optHtml=q.opts.map((o,i)=>{
      let cls='opt-btn';
      if(ps.showAnswer&&i===q.ans)cls+=' revealed';
      if(ps.picked===i&&!(ps.showAnswer&&i===q.ans))cls+=' picked';
      return `<button class="${cls}" onclick="practicePick(${i})">${String.fromCharCode(65+i)}) ${o}</button>`;
    }).join('');
    if(ps.showAnswer){
      fbText='Answer: '+String.fromCharCode(65+q.ans)+') '+q.opts[q.ans];fbCls+=' info';
      rationaleHtml=`<div class="rationale"><strong>Rationale:</strong> ${q.rat}</div>`;
      practiceControls=`<button class="action-btn active-toggle" onclick="toggleShowAnswer()">Hide answer</button>`;
    } else if(ps.picked!==null){
      fbText='Selected: '+String.fromCharCode(65+ps.picked)+') '+q.opts[ps.picked];fbCls+=' info';
      practiceControls=`<button class="action-btn" onclick="toggleShowAnswer()">Show answer</button>`;
    } else {
      practiceControls=`<button class="action-btn" onclick="toggleShowAnswer()">Show answer</button>`;
    }
    navRight=`<button class="action-btn" ${current===0?'disabled':''} onclick="prev()">&larr; Back</button><button class="next-btn" onclick="next()">${isLast?'Finish &rarr;':'Next &rarr;'}</button>`;
  }

  const badge=mode==='practice'?'<span class="mode-badge badge-practice">Practice</span>':'<span class="mode-badge badge-test">Test</span>';
  root.innerHTML=`
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    ${badge}
    <div class="q-counter">Question ${current+1} of ${questions.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${optHtml}</div>
    ${hint}
    <div class="feedback-wrap"><div class="${fbCls}">${fbText}</div></div>
    ${rationaleHtml}
    <div class="nav">
      <div class="nav-left">
        <button class="action-btn" onclick="backToMenu()">&#8862; Menu</button>
        <button class="${isFlagged?'flag-btn flagged':'flag-btn'}" onclick="toggleFlag()">&#127988; ${isFlagged?'Flagged':'Flag'}</button>
        ${practiceControls}
      </div>
      <div class="nav-right">${navRight}</div>
    </div>
    ${numGrid()}`;
}

function testPick(i){if(testGraded)return;testState[current]=i;render();}
function submitTest(){testGraded=true;current=0;render();}
function practicePick(i){practiceState[current].picked=i;render();}
function toggleShowAnswer(){practiceState[current].showAnswer=!practiceState[current].showAnswer;render();}
function toggleFlag(){flagged[current]=!flagged[current];render();}
function next(){current++;render();}
function prev(){if(current>0){current--;render();}}
function backToMenu(){mode=null;renderModeSelect();}

function renderTestResults(){
  const root=document.getElementById('root');
  const score=testState.filter((s,i)=>s===activeQuestions[i].ans).length;
  const wrong=testState.filter((s,i)=>s!==null&&s!==activeQuestions[i].ans).length;
  const unanswered=testState.filter(s=>s===null).length;
  const stillFlagged=flagged.filter(Boolean).length;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'&#127881; Excellent work!':pct>=70?'&#128077; Good job &mdash; keep reviewing!':'&#128218; Keep studying &mdash; you\'ve got this!';
  const missedItems=activeQuestions.map((q,i)=>testState[i]!==q.ans?{q:q.q,correct:String.fromCharCode(65+q.ans)+') '+q.opts[q.ans]}:null).filter(Boolean);
  const missedHtml=missedItems.length?'<div class="missed-list">'+missedItems.map(m=>`<div class="missed-item"><div class="missed-q">${m.q}</div><div class="missed-a">&#10003; ${m.correct}</div></div>`).join('')+'</div>':'';
  root.innerHTML=`<div class="score-card"><div class="score-num">${score}/${questions.length}</div><div class="score-label">${pct}% correct</div>
    <div class="summary-row">
      <span class="summary-pill pill-correct">&#10003; ${score} correct</span>
      <span class="summary-pill pill-wrong">&#10007; ${wrong} wrong</span>
      ${unanswered?`<span class="summary-pill" style="background:var(--hover);color:var(--text2)">&#8212; ${unanswered} skipped</span>`:''}
      ${stillFlagged?`<span class="summary-pill pill-flag">&#127988; ${stillFlagged} flagged</span>`:''}
    </div>
    <div class="score-msg">${msg}</div>
    <div class="end-btns">
      <button class="restart-btn" onclick="reviewTest()">Review answers</button>
      <button class="restart-btn" onclick="startMode('test')">Retake test</button>
      <button class="restart-btn" onclick="startMode('practice')">Practice mode</button>
      <button class="restart-btn" onclick="backToMenu()">Menu</button>
    </div>
    ${missedItems.length?'<p style="font-size:13px;color:var(--text2);margin-top:1.5rem;text-align:left;font-weight:500;">Questions you missed:</p>'+missedHtml:''}</div>`;
}
function reviewTest(){current=0;render();}
function renderPracticeEnd(){
  document.getElementById('root').innerHTML=`<div class="practice-end"><div class="big">&#128218;</div><h2>Practice complete!</h2><p>You reviewed all ${activeQuestions.length} questions.</p><div class="end-btns"><button class="restart-btn" onclick="startMode('practice')">Practice again</button><button class="restart-btn" onclick="startMode('test')">Take the test</button><button class="restart-btn" onclick="backToMenu()">Menu</button></div></div>`;
}

renderModeSelect();
</script>
</body>
</html>
